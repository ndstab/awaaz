{% extends "base.html" %}
{% load static %}

{% block content %}
  <article class="form-card">
    <header>
      <h2>Report an incident</h2>
      <p>Fill in the details and drop a pin on the map.</p>
    </header>

    <form id="report-form">
      <label for="type">Type</label>
      <select id="type" name="type" required>
        <option value="ACCIDENT">Accident</option>
        <option value="FLOOD">Flood</option>
        <option value="ROAD_CLOSURE">Road closure</option>
        <option value="CONSTRUCTION">Construction</option>
        <option value="POLICE_NAKA">Police naka</option>
        <option value="PROTEST">Protest</option>
        <option value="HAZARD">Hazard</option>
        <option value="OTHER">Other</option>
      </select>

      <label for="severity">Severity</label>
      <select id="severity" name="severity" required>
        <option value="LOW">Low</option>
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
        <option value="CRITICAL">Critical</option>
      </select>

      <label for="description">Description</label>
      <textarea id="description" name="description" rows="3" maxlength="500"></textarea>

      <label for="city">City</label>
      <input id="city" name="city" type="text" required />

      <label for="state">State</label>
      <input id="state" name="state" type="text" required />

      <label for="address_text">Nearest landmark / address</label>
      <input id="address_text" name="address_text" type="text" />

      <input id="lat" name="lat" type="hidden" />
      <input id="lng" name="lng" type="hidden" />

      <section class="map-wrap">
        <h3>Incident location</h3>
        <p id="location-hint">Click the map to set incident location.</p>
        <div id="map"></div>
      </section>

      <button type="submit">Submit incident</button>
      <p id="report-message" role="status"></p>
    </form>
  </article>

  <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
  <script src="{% static 'js/auth.js' %}"></script>
  <script src="{% static 'js/report.js' %}"></script>
{% endblock %}
